<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSync HIS - Clinical Management System</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e3a8a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: #1e3a8a;
        }

        .hospital-branding {
            color: #64748b;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .loader {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #1e3a8a;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">MediSync HIS</div>
        <div class="hospital-branding">Enterprise Clinical Management Environment</div>
        <div class="loader"></div>
        <p>This is a static entry point for server verification.</p>
        <a href="/" class="btn">Enter Live Application</a>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8;">
            Note: Use 'npm run dev' and visit localhost:3000 for standard access.
        </p>
    </div>
</body>

</html>
